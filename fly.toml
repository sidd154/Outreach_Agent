app = "outreach-agent-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "outreach_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
